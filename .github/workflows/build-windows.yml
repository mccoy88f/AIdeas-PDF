name: Build Windows

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Add Windows desktop support
        run: flutter create --platforms=windows .

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package executable
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $dst = "AIdeas-PDF-Windows"
          Copy-Item -Recurse $src $dst
          Compress-Archive -Path $dst -DestinationPath AIdeas-PDF-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIdeas-PDF-Windows
          path: AIdeas-PDF-Windows.zip
          retention-days: 30
