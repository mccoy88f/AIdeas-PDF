name: aideas_pdf
description: AIdeas PDF - Editor PDF professionale con redazione sicura
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # PDF rendering e viewing
  pdfrx: ^1.0.70                    # Viewer PDF alta qualità (basato su PDFium/MuPDF)

  # File handling
  cross_file: ^0.3.4+2
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  share_plus: ^10.0.0

  # Immagini
  image_picker: ^1.1.2
  image: ^4.2.0

  # ZIP per export
  archive: ^3.6.1

  # UI utilities
  flutter_colorpicker: ^1.1.0
  google_fonts: ^6.2.1

  # Icone
  flutter_svg: ^2.0.10+1

  # Permessi
  permission_handler: ^11.3.1

  # Word/ODT export
  docx_template: ^0.4.0
  provider: ^6.1.2

  # PDF editing nativo: redazione vera, annotazioni vettoriali, testo selezionabile
  syncfusion_flutter_pdf: ^27.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
